[mod-setting-description]
castra-prime-disable-artillery=Verhindert, dass feindliche Basen Artillerietürme errichten. Empfohlen für lange Spielrunden
castra-prime-buffed-forge=Erhöht die Fertigungsgeschwindigkeit der Schmiede auf 3,0, den Produktivitätsbonus auf 50 % und senkt den Energieverbrauch auf 2,5 MW.
castra-prime-gates-progression=Wenn diese Option aktiviert ist (Standardeinstellung), sind Castra-Ressourcen für den Fortschritt im späteren Spielverlauf erforderlich: Lithiumbatterien werden für die Herstellung von Railguns und Promethium-Wissenschaftspaketen benötigt, und Wissenschaftspakete für Schlachtfelder ist für die Forschung zu Promethium-Wissenschaft und Forschungsproduktivität erforderlich. Deaktiviere diese Option, um Castra zu einem optionalen Nebenplaneten zu machen.
castra-prime-suppress-research-msg=Unterdrückt Meldungen über den Forschungsfortschritt des Gegners. Nützlich für Spieler, die ein intensiveres Spielerlebnis ohne ständige Benachrichtigungen bevorzugen.
castra-prime-research-rate-multiplier=Multipliziert die Forschungsgeschwindigkeit der gegnerischen Fraktion. Der Standardwert 1,0 entspricht dem Original-Mod. Werte unter 1,0 verlangsamen die gegnerische Forschung – höhere Werte beschleunigen sie. Bereich: 0,01 bis 100. HINWEIS: Die gegnerische Forschung wird durch die Engine begrenzt, sodass Erhöhungen möglicherweise nicht wie beabsichtigt funktionieren.
castra-prime-nauvis-nukes=Wenn aktiviert, wird das Wissenschaftspaket für Schlachtfelder aus der Atomwaffentechnologie entfernt, sodass diese ohne Besuch in Castra erforscht werden kann.
castra-prime-buff-equipment=Verbessert den durch diesen Mod hinzugefügten Energieschild MK3 (450 HP, 18/s Regeneration, 300 kW Leistungsaufnahme) und die Batterie MK3 (300 MJ Kapazität). Wenn diese Option deaktiviert ist, werden die ursprünglichen Mod-Werte verwendet.
castra-prime-disable-enemy-nukes=Verhindert, dass feindliche Raketentürme Atombomben oder Wasserstoffbomben laden. Vorhandene Nuklearmunition bleibt bis zum Abfeuern erhalten. Vorhandene Nuklearmunition wird nicht aus den Türmen entfernt.
castra-prime-disable-land-mines=Entfernt keine vorhandenen Minen
castra-prime-nerf-enemy-bases=Reduziert die Gesundheit, Resistenzen und Regenerationsrate aller feindlichen Datensammler um 50 %.

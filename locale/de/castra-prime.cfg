[tips-and-tricks-item-description]
castra-briefing=Wenn [entity=data-collector] Basen in Ihrer Umgebung Daten sammeln, schreitet der Gegner im Forschungsbaum weiter voran und verbessert die Basen. Halten Sie mit Ihrer eigenen militärischen Forschung Schritt, um den Feind voraus zu bleiben. [item=castra-data] erhalten Sie, wenn ein [entity=data-collector] genügend Daten gesammelt hat, dann erscheint der Gegenstand. Entitäten, die Daten aussenden, weisen in ihrer Beschreibung darauf hin.


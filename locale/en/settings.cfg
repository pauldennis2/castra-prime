[mod-setting-description]
castra-prime-disable-artillery=Prevents enemy bases from building artillery turrets. Recommended for long playthroughs.
castra-prime-buffed-forge=Increases Forge crafting speed to 3.0, productivity bonus to 50%, and reduces energy consumption to 2.5MW.
castra-prime-gates-progression=When enabled (default), Castra resources are required for late-game progression: lithium batteries are needed to craft railguns and promethium science packs, and battlefield science is required for promethium science and research productivity research. Disable to make Castra an optional side-planet.
castra-prime-suppress-research-msg=Suppresses messages about enemy research progress. Useful for players who prefer a more immersive experience without constant notifications.
castra-prime-research-rate-multiplier=Multiplies the enemy faction research speed. Default 1.0 is unchanged from the original mod. Values less than 1.0 slow enemy research - higher values increase it. Range: 0.01 to 100. NOTE: Enemy research is limited by the engine, so increases may not work as intended.
castra-prime-buff-equipment=Buffs the Energy Shield MK3 (450 HP, 18/s regen, 300kW draw) and Battery MK3 (300MJ capacity) added by this mod. If unchecked, uses original mod values.
castra-prime-disable-enemy-nukes=Prevents enemy rocket turrets from loading atomic bombs or hydrogen bombs. Existing nuclear ammo will remain until fired. Will not remove existing nuclear ammo from turrets.
castra-prime-disable-land-mines=Will not remove existing mines
castra-prime-nerf-enemy-bases=Reduces the health, resistances, and regen rate of all enemy data collectors by 50%.

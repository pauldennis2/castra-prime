[tips-and-tricks-item-description]
castra-briefing=[planet=castra] is a militarized wasteland occupied by a hostile faction that studies and mirrors your technology, continuously upgrading its defenses over time.\n\n[entity=data-collector] bases emit data pollution that periodically drops [item=castra-data] — collect them quickly, as they spoil within one minute. The longer collectors operate freely, the more their bases upgrade with new turrets, walls, roboports, and solar panels.\n\nDeploy [entity=jammer-radar] near enemy collectors to drain data pollution and slow the rate of base upgrades and item spawns.\n\n[item=millerite] is the primary ore, processed into [item=nickel-plate] nickel plate used in most local recipes. [fluid=hydrogen-sulfide] is extracted from [entity=hydrogen-sulfide-vent]. [item=gunpowder] deposits can be mined directly. Oceans of [fluid=light-oil] can be pumped with an [entity=offshore-pump]. [item=copper-ore] and [item=uranium-ore] are also present.\n\nThe [entity=forge] is the planetary crafting building featuring built-in productivity and quality bonuses. Unlocking it requires processing all three of Castra's unique resources, and it is needed to produce [item=battlefield-science-pack].
castra-lithium-supply=[planet=castra] contains no lithium. To produce [item=lithium-battery], you will need to either import [item=lithium] from another planet, or export [item=nickel-plate] to produce batteries elsewhere.


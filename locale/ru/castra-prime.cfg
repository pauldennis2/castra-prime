combat-roboport=При обнаружении врагов поблизости активирует боевых дронов. Можно загрузить [item=defender-capsule], [item=distractor-capsule], или [item=destroyer-capsule] — за одно развёртывание расходуется одна капсула. Срабатывает каждые 5 секунд.\n\nРадиус обнаружения: 20 клеток (+1 за каждый уровень качества)\nДронов за одно равёртывание: 5 (+1 за каждый уровень качества)\nКачество дрона соответствует качеству загруженной капсулы.

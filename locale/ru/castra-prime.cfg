[tips-and-tricks-item-description]
castra-briefing=[planet=castra] это милитаризированная вымирающая пустошь, оккупированная враждебной фракцией, которая изучает и копирует ваши технологии, постоянно совершенствуя свою оборону с течением времени.\n\n[entity=data-collector] излучают новый тип загрязнения и переодически сбрасывают [item=castra-data] — Собирайте их быстро, так как они портятся в течение одной минуты. Чем дольше сборщики работают в свободном режиме, тем больше их баз модернизируются за счет новых турелей, стен, робопортов и солнечных панелей.\n\nРазместите [entity=jammer-radar] рядом с вражескими сборщиками данных, чтобы снизить уровень загрязнения данными и замедлить скорость улучшения базы и появления предметов.\n\n[item=millerite] это основная руда, перерабатываемая в [item=nickel-plate] используемую в большинстве местных рецептов. [fluid=hydrogen-sulfide] добывается из [entity=hydrogen-sulfide-vent]. Месторождения [item=gunpowder] можно добывать напрямую. Океаны из [fluid=light-oil] добываются с помощью [entity=offshore-pump]. Также присутствуют [item=copper-ore] и [item=uranium-ore].\n\n[entity=forge] это эксклюзивное здание этой планеты, обладающее встроенными бонусами к производительности и качеству. Для его разблокировки необходимо обработать все три уникальных ресурса Кастры, и он необходим для производства [item=battlefield-science-pack].
castra-lithium-supply=[planet=castra] не содержит лития. Для производства [item=lithium-battery], вам потребуется либо импортировать [item=lithium] с другой планеты, либо экспортировать [item=nickel-plate] для производства батарей в другом месте.


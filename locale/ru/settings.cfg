[mod-setting-description]
castra-prime-disable-artillery=Предотвращает строительство артиллерийских орудий на базах. Рекомендуется для длительных прохождений.
castra-prime-buffed-forge=Увеличивает скорость крафта в кузнице до 3,0, бонус к производительности до 50% и снижает энергопотребление до 2,5 МВт.
castra-prime-gates-progression=При включении (по умолчанию) ресурсы Кастры необходимы для развития на поздних этапах игры: литиевые батареи нужны для создания рельсотронных орудий и научных пакетов с прометием, а боевые исследовательские пакеты — для исследований с использованием прометия и повышения производительности исследований. Отключите эту функцию, чтобы сделать Кастру просто дополнительной планетой.
castra-prime-suppress-research-msg=Отключает сообщения о ходе исследований противника. Полезно для игроков, предпочитающих более полное погружение в игровой процесс без постоянных уведомлений.
castra-prime-research-rate-multiplier=Умножает скорость исследования вражеской фракции. Значение по умолчанию 1.0 не изменилось по сравнению с оригинальным модом. Значения меньше 1.0 замедляют исследование вражеской фракции, более высокие значения увеличивают его. Диапазон: от 0.01 до 100. ПРИМЕЧАНИЕ: Исследование вражеской фракции ограничено движком, поэтому увеличение скорости может работать некорректно.
castra-prime-nauvis-nukes=При включении этой функции боевой исследовательский пакет удаляется из списка технологий создания атомной бомбы, что позволяет исследовать её без посещения Кастры.
castra-prime-buff-equipment=Усиливает энергетический щит MK3 (450 HP, регенерация 18/с, потребление 300 кВт) и батарею MK3 (емкость 300 МДж), добавленные этим модом. Если выключено, используются значения из оригинального мода.
castra-prime-disable-enemy-nukes=Предотвращает загрузку ядерных боеприпасов в орудия противника: атомных и водородных бомб в ракетные турели, а также ядерных артиллерийских снарядов (Церис/Мараксис) в артиллерийские орудия. Имеющиеся ядерные боеприпасы останутся до выстрела. Не извлекает имеющиеся ядерные боеприпасы из турелей.
castra-prime-disable-land-mines=Существующие мины не изчезнут
castra-prime-nerf-enemy-bases=Снижает здоровье, сопротивление и скорость регенерации всех вражеских сборщиков данных на 50%.
